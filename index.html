<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>MiYoViajo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="logo">
        <span class="bus-icon">🚌</span>
        <span>MiYoViajo</span>
      </div>
      <div id="route-selector">
        <select id="route-select">
        </select>
        <span id="route-arrow">▾</span>
      </div>
      <button id="record-btn" title="Registrar horario">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="8"/>
          <circle cx="12" cy="12" r="3.5" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button id="edit-btn" title="Editar ruta">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </header>

    <!-- Edit mode bar -->
    <div id="edit-bar" class="hidden">
      <span id="edit-bar-label">✏️ Toca el mapa para agregar parada</span>
      <div class="edit-bar-actions">
        <button id="edit-reset-btn">Restaurar</button>
        <button id="edit-save-btn">Guardar</button>
      </div>
    </div>

    <!-- Add stop modal -->
    <div id="edit-modal" class="hidden">
      <div class="edit-modal-box">
        <div class="edit-modal-title">Nueva parada</div>
        <input id="edit-stop-name" type="text" placeholder="Nombre de la parada" autocomplete="off" />
        <div class="edit-modal-actions">
          <button id="edit-modal-cancel">Cancelar</button>
          <button id="edit-modal-confirm">Agregar</button>
        </div>
      </div>
    </div>

    <div id="map"></div>

    <div id="bottom-panel">
      <div id="panel-handle-area">
        <div id="panel-handle"></div>
      </div>

      <div id="panel-content">
        <div id="my-location-row">
          <div id="location-info">
            <span id="location-dot"></span>
            <span id="location-text">Buscando ubicación...</span>
          </div>
          <button id="center-btn" title="Centrar en mi ubicación">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
            </svg>
          </button>
        </div>

        <div id="offline-section">
          <button id="download-btn">⬇ Descargar mapa</button>
          <div id="download-progress" style="display:none">
            <div id="download-bar"><div id="download-fill"></div></div>
            <span id="download-label"></span>
          </div>
        </div>

        <div id="next-stop-section">
          <div class="section-label">Parada más cercana</div>
          <div id="next-stop-name">—</div>
          <div id="next-stop-dist">—</div>
        </div>

        <div id="schedule-section">
          <div class="section-label">Próximos horarios</div>
          <div id="schedule-chips"></div>
        </div>

        <div id="stops-list">
          <div class="section-label">Paradas</div>
          <div class="stops-select-wrapper">
            <select id="stops-select"></select>
            <span class="stops-arrow">▾</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
