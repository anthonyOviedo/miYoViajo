name: Discord Deploy Notification

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord – Deploy Started
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          AUTHOR="${{ github.event.head_commit.author.name }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          curl -s -X POST "${{ secrets.DISCORD_WH }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚌 MiYoViajo — Deploy en progreso\",
                \"description\": \"Nuevo push detectado, Netlify está desplegando...\",
                \"color\": 16776960,
                \"fields\": [
                  { \"name\": \"📝 Commit\", \"value\": \"\`$SHORT_SHA\` $COMMIT_MSG\", \"inline\": false },
                  { \"name\": \"👤 Autor\", \"value\": \"$AUTHOR\", \"inline\": true },
                  { \"name\": \"🌿 Rama\", \"value\": \"\`main\`\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"GitHub Actions\" },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

  health-check:
    runs-on: ubuntu-latest
    needs: notify
    steps:
      - name: Wait for Netlify deploy
        run: sleep 60

      - name: Health check
        id: check
        run: |
          URL="https://miyoviajo.netlify.app"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL")
          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 15 "$URL")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "response_time=$RESPONSE_TIME" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Notify Discord – Health OK
        if: steps.check.outputs.status == '200'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WH }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ MiYoViajo — App saludable\",
                \"description\": \"El sitio responde correctamente tras el deploy.\",
                \"color\": 3066993,
                \"fields\": [
                  { \"name\": \"🌐 URL\", \"value\": \"${{ steps.check.outputs.url }}\", \"inline\": false },
                  { \"name\": \"📶 HTTP\", \"value\": \"\`${{ steps.check.outputs.status }}\`\", \"inline\": true },
                  { \"name\": \"⚡ Respuesta\", \"value\": \"${{ steps.check.outputs.response_time }}s\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"Health Check\" },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

      - name: Notify Discord – Health FAIL
        if: steps.check.outputs.status != '200'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WH }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ MiYoViajo — App caída\",
                \"description\": \"El sitio no responde correctamente. Revisar en Netlify.\",
                \"color\": 15158332,
                \"fields\": [
                  { \"name\": \"🌐 URL\", \"value\": \"${{ steps.check.outputs.url }}\", \"inline\": false },
                  { \"name\": \"📶 HTTP\", \"value\": \"\`${{ steps.check.outputs.status }}\`\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"Health Check\" },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

      - name: Fail workflow if unhealthy
        if: steps.check.outputs.status != '200'
        run: exit 1
